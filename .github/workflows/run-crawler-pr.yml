name: Run crawler and open PR

on:
  workflow_dispatch:
  schedule:
    - cron: "30 8 * * *"

permissions:
  contents: write
  pull-requests: write

jobs:
  test-scan-pr:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install -e .

      - name: Run tests
        run: pytest -q

      - name: Run crawler in incremental mode
        env:
          GITHUB_AUTH: ${{ secrets.GH_PAT != '' && secrets.GH_PAT || github.token }}
        run: |
          python main.py . --json --csv --html --incremental

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: Update crawler reports
          title: Update crawler reports
          body: |
            Automated crawler run updated reports and cache artifacts.
          branch: bot/update-crawler-reports
          delete-branch: true
